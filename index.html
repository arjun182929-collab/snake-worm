<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake vs Worms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; }
        body { background: #1a1a2e; font-family: Arial, sans-serif; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: fixed; top: 10px; left: 10px; color: #fff; font-size: 14px; z-index: 100; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; }
        
        #leaderboard { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; color: #fff; font-size: 12px; z-index: 100; pointer-events: none; max-width: 140px; }
        #leaderboard h4 { color: #ffd700; margin-bottom: 5px; font-size: 12px; }
        #lbList { list-style: none; }
        #lbList li { padding: 2px 0; display: flex; justify-content: space-between; }
        #lbList li.player { color: #0f8; }
        
        #minimap { position: fixed; bottom: 10px; right: 10px; width: 80px; height: 80px; background: rgba(0,0,0,0.4); border-radius: 8px; z-index: 100; pointer-events: none; }
        
        #boostBar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; z-index: 100; pointer-events: none; }
        #boostFill { height: 100%; background: #0f8; border-radius: 3px; width: 100%; }
        
        #controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 150; display: none; }
        #controls.visible { display: grid; }
        .dpad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 3px; }
        .dpad button:nth-child(1) { grid-area: 1/2; }
        .dpad button:nth-child(2) { grid-area: 2/1; }
        .dpad button:nth-child(3) { grid-area: 2/3; }
        .dpad button:nth-child(4) { grid-area: 3/2; }
        .ctrl-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 18px; cursor: pointer; }
        .ctrl-btn:active { background: rgba(0,255,136,0.3); }
        #boostCtrl { position: absolute; right: -60px; top: 50%; transform: translateY(-50%); background: rgba(0,255,136,0.2); border-color: rgba(0,255,136,0.4); }
        
        #settingsBtn { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 15px; border-radius: 15px; font-size: 12px; z-index: 150; cursor: pointer; display: none; }
        
        .screen { position: fixed; inset: 0; background: rgba(15,15,26,0.97); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .screen.hidden { display: none; }
        h1 { color: #0f8; font-size: clamp(28px, 8vw, 48px); margin-bottom: 15px; text-align: center; }
        .btn { background: #0f8; border: none; padding: 12px 30px; font-size: 16px; color: #1a1a2e; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 8px; }
        .btn:active { transform: scale(0.95); }
        
        .skin-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; max-width: 300px; }
        .skin-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .skin-btn.sel { border-color: #fd0; }
        
        .opts { margin: 10px 0; color: #aaa; font-size: 13px; }
        .opts label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        #info { color: #666; font-size: 12px; margin-top: 15px; text-align: center; }
        
        #panel { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: rgba(26,26,46,0.98); z-index: 300; transition: right 0.2s; padding: 15px; overflow-y: auto; color: #fff; font-size: 13px; }
        #panel.open { right: 0; }
        #panel h3 { font-size: 16px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #333; }
        #panel .close { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .set-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .set-row select, .set-row input { background: #333; border: 1px solid #444; color: #fff; padding: 5px 8px; border-radius: 5px; font-size: 12px; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 8px 0; }
        .clr-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .clr-btn.sel { border-color: #fd0; }
        .apply { width: 100%; background: #0f8; border: none; padding: 10px; border-radius: 8px; color: #1a1a2e; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="stat">Length: <span id="len">10</span></div>
        <div class="stat">Score: <span id="score">0</span></div>
    </div>
    
    <div id="leaderboard"><h4>Top 5</h4><ol id="lbList"></ol></div>
    <canvas id="minimap" width="80" height="80"></canvas>
    <div id="boostBar"><div id="boostFill"></div></div>
    
    <button id="settingsBtn">⚙️</button>
    
    <div id="controls">
        <div class="dpad">
            <button class="ctrl-btn" data-d="u">▲</button>
            <button class="ctrl-btn" data-d="l">◀</button>
            <button class="ctrl-btn" data-d="r">▶</button>
            <button class="ctrl-btn" data-d="d">▼</button>
        </div>
        <button class="ctrl-btn" id="boostCtrl">⚡</button>
    </div>
    
    <div id="panel">
        <button class="close" onclick="togglePanel()">×</button>
        <h3>Settings</h3>
        <div class="set-row"><span>Color</span></div>
        <div class="color-grid" id="colorGrid"></div>
        <div class="set-row"><span>Head</span><select id="headSize"><option value="0.8">S</option><option value="1" selected>M</option><option value="1.2">L</option></select></div>
        <div class="set-row"><span>Speed</span><input type="range" id="spd" min="2" max="6" value="4" style="width:80px"></div>
        <div class="set-row"><span>Glow</span><input type="range" id="glw" min="0" max="50" value="20" style="width:80px"></div>
        <button class="apply" onclick="applySet()">Apply</button>
    </div>
    
    <div id="startScreen" class="screen">
        <h1>🐍 Snake vs Worms</h1>
        <div class="skin-row" id="skinRow"></div>
        <div class="opts"><label><input type="checkbox" id="bigStart"> Start bigger</label></div>
        <button class="btn" onclick="startGame()">Play</button>
        <div id="info">Move: Mouse / WASD / Touch<br>Boost: Click / Space / Tap ⚡</div>
    </div>
    
    <div id="endScreen" class="screen hidden">
        <h1 style="color:#f44;">Game Over</h1>
        <div id="finalScore" style="color:#fd0;font-size:28px;margin:15px 0;">0</div>
        <button class="btn" onclick="restart()">Play Again</button>
    </div>

    <script>
    (function() {
        'use strict';
        
        const CFG = {
            WORLD: 3500,
            FOOD: 150,
            AI: 12,
            MAX_SEGMENTS: 200,
            FPS: 60,
            FRAME_TIME: 1000 / 60
        };
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const miniCanvas = document.getElementById('minimap');
        const miniCtx = miniCanvas.getContext('2d', { alpha: false });
        
        let W = 0, H = 0;
        
        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);
        
        const COLORS = ['#0f8','#f45','#48f','#fd0','#f6a','#0df','#f93','#a5e','#2d8','#f7a'];
        
        let running = false, frame = 0, lastTime = 0;
        let player = null, aiList = [], foods = [];
        let cam = { x: 0, y: 0 };
        let mouse = { x: 0, y: 0 };
        let keys = {}, boost = false, ctrl = { u: 0, d: 0, l: 0, r: 0 };
        
        let settings = { color: '#0f8', head: 1, speed: 4, glow: 20 };
        
        const skinRow = document.getElementById('skinRow');
        const colorGrid = document.getElementById('colorGrid');
        
        COLORS.forEach((c, i) => {
            const b = document.createElement('div');
            b.className = 'skin-btn' + (i === 0 ? ' sel' : '');
            b.style.background = c;
            b.onclick = function() {
                skinRow.querySelectorAll('.skin-btn').forEach(function(x) { x.classList.remove('sel'); });
                b.classList.add('sel');
                settings.color = c;
            };
            skinRow.appendChild(b);
            
            const b2 = document.createElement('div');
            b2.className = 'clr-btn' + (i === 0 ? ' sel' : '');
            b2.style.background = c;
            b2.onclick = function() {
                colorGrid.querySelectorAll('.clr-btn').forEach(function(x) { x.classList.remove('sel'); });
                b2.classList.add('sel');
                settings.color = c;
            };
            colorGrid.appendChild(b2);
        });
        
        function Snake(x, y, color, isPlayer, len) {
            this.segs = [];
            this.color = color;
            this.isPlayer = isPlayer;
            this.alive = true;
            this.spd = isPlayer ? settings.speed : 4;
            this.boostSpd = this.spd * 1.8;
            this.curSpd = this.spd;
            this.ang = Math.random() * Math.PI * 2;
            this.tAng = this.ang;
            this.boosting = false;
            this.energy = 100;
            this.name = isPlayer ? 'You' : ['Viper','Cobra','Noodle','Snek','Wiggle'][(Math.random()*5)|0];
            this.headSize = isPlayer ? settings.head : 1;
            
            for (let i = 0; i < len; i++) {
                this.segs.push({ x: x - i * 6, y: y });
            }
        }
        
        Snake.prototype.head = function() { return this.segs[0]; };
        Snake.prototype.len = function() { return this.segs.length; };
        
        Snake.prototype.update = function(tx, ty, bst) {
            if (!this.alive) return;
            
            const h = this.segs[0];
            
            if (tx !== undefined) {
                const wx = h.x + (tx - W / 2);
                const wy = h.y + (ty - H / 2);
                this.tAng = Math.atan2(wy - h.y, wx - h.x);
            }
            
            let diff = this.tAng - this.ang;
            if (diff > Math.PI) diff -= Math.PI * 2;
            if (diff < -Math.PI) diff += Math.PI * 2;
            this.ang += diff * 0.08;
            
            if (bst && this.energy > 0 && this.segs.length > 5) {
                this.curSpd = this.boostSpd;
                this.boosting = true;
                this.energy -= 0.8;
                if (Math.random() < 0.2 && this.segs.length > 5) {
                    const t = this.segs.pop();
                    foods.push({ x: t.x, y: t.y, sz: 6, val: 1, rem: true, pulse: 0 });
                }
            } else {
                this.curSpd = this.spd;
                this.boosting = false;
                this.energy = Math.min(100, this.energy + 0.25);
            }
            
            const nx = Math.max(10, Math.min(CFG.WORLD - 10, h.x + Math.cos(this.ang) * this.curSpd));
            const ny = Math.max(10, Math.min(CFG.WORLD - 10, h.y + Math.sin(this.ang) * this.curSpd));
            
            this.segs.unshift({ x: nx, y: ny });
            if (this.segs.length > CFG.MAX_SEGMENTS) this.segs.pop();
        };
        
        Snake.prototype.grow = function(n) {
            const t = this.segs[this.segs.length - 1];
            for (let i = 0; i < n && this.segs.length < CFG.MAX_SEGMENTS; i++) {
                this.segs.push({ x: t.x, y: t.y });
            }
        };
        
        Snake.prototype.die = function() {
            this.alive = false;
            const step = Math.max(1, (this.segs.length / 30) | 0);
            for (let i = 0; i < this.segs.length && foods.length < CFG.FOOD * 1.5; i += step) {
                foods.push({ x: this.segs[i].x, y: this.segs[i].y, sz: 8, val: 1, rem: true, pulse: 0 });
            }
        };
        
        Snake.prototype.draw = function() {
            if (!this.alive) return;
            
            const bs = this.isPlayer ? 12 : 10;
            const glw = this.isPlayer ? settings.glow : 15;
            const color = this.color;
            const camX = cam.x, camY = cam.y;
            
            for (let i = this.segs.length - 1; i >= 0; i--) {
                const s = this.segs[i];
                const sx = s.x - camX, sy = s.y - camY;
                
                if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) continue;
                
                const r = 1 - (i / this.segs.length) * 0.3;
                const sz = bs * r;
                
                if (glw > 0 && (i & 1) === 0) {
                    ctx.fillStyle = color + '22';
                    ctx.beginPath();
                    ctx.arc(sx, sy, sz + glw / 10, 0, 6.28);
                    ctx.fill();
                }
                
                ctx.fillStyle = this.boosting && (i & 3) < 2 ? '#fff' : color;
                ctx.beginPath();
                ctx.arc(sx, sy, sz, 0, 6.28);
                ctx.fill();
            }
            
            const h = this.segs[0];
            const hx = h.x - camX, hy = h.y - camY;
            const hs = (bs + 2) * this.headSize;
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(hx, hy, hs, 0, 6.28);
            ctx.fill();
            
            const eo = hs * 0.4, es = hs * 0.3;
            const a1 = this.ang - 0.5, a2 = this.ang + 0.5;
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(hx + Math.cos(a1) * eo, hy + Math.sin(a1) * eo, es, 0, 6.28);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(hx + Math.cos(a2) * eo, hy + Math.sin(a2) * eo, es, 0, 6.28);
            ctx.fill();
            
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(hx + Math.cos(a1) * eo + Math.cos(this.ang) * es * 0.3, hy + Math.sin(a1) * eo + Math.sin(this.ang) * es * 0.3, es * 0.45, 0, 6.28);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(hx + Math.cos(a2) * eo + Math.cos(this.ang) * es * 0.3, hy + Math.sin(a2) * eo + Math.sin(this.ang) * es * 0.3, es * 0.45, 0, 6.28);
            ctx.fill();
            
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText(this.name, hx, hy - hs - 8);
        };
        
        function AI(x, y) {
            Snake.call(this, x, y, COLORS[(Math.random() * COLORS.length) | 0], false, 5 + ((Math.random() * 15) | 0));
            this.timer = 0;
            this.target = null;
        }
        AI.prototype = Object.create(Snake.prototype);
        
        AI.prototype.updateAI = function() {
            if (!this.alive) return;
            this.timer++;
            
            if ((this.timer % 25) === 0) {
                let minD = 400, closest = null;
                for (let i = 0; i < foods.length; i++) {
                    const f = foods[i];
                    const d = Math.abs(f.x - this.segs[0].x) + Math.abs(f.y - this.segs[0].y);
                    if (d < minD) { minD = d; closest = f; }
                }
                this.target = closest;
            }
            
            if (this.target) {
                this.tAng = Math.atan2(this.target.y - this.segs[0].y, this.target.x - this.segs[0].x);
            }
            
            this.update(W / 2, H / 2, Math.random() < 0.003 && this.segs.length > 12);
        };
        
        function spawnFood() {
            return {
                x: 50 + Math.random() * (CFG.WORLD - 100),
                y: 50 + Math.random() * (CFG.WORLD - 100),
                sz: 10 + ((Math.random() * 8) | 0),
                val: 1 + ((Math.random() * 2) | 0),
                rem: false,
                pulse: Math.random() * 6.28
            };
        }
        
        function init(big) {
            player = new Snake(CFG.WORLD / 2, CFG.WORLD / 2, settings.color, true, big ? 20 : 10);
            player.headSize = settings.head;
            
            aiList = [];
            for (let i = 0; i < CFG.AI; i++) {
                aiList.push(new AI(Math.random() * CFG.WORLD, Math.random() * CFG.WORLD));
            }
            
            foods = [];
            for (let i = 0; i < CFG.FOOD; i++) {
                foods.push(spawnFood());
            }
            
            cam.x = player.segs[0].x - W / 2;
            cam.y = player.segs[0].y - H / 2;
            
            mouse.x = W / 2;
            mouse.y = H / 2;
        }
        
        function collide() {
            if (!player || !player.alive) return;
            
            const ph = player.segs[0];
            
            for (let i = foods.length - 1; i >= 0; i--) {
                const f = foods[i];
                if (Math.abs(f.x - ph.x) < 20 && Math.abs(f.y - ph.y) < 20) {
                    player.grow(f.val);
                    foods.splice(i, 1);
                }
            }
            
            for (let a = 0; a < aiList.length; a++) {
                const ai = aiList[a];
                if (!ai.alive) continue;
                const ah = ai.segs[0];
                for (let i = foods.length - 1; i >= 0; i--) {
                    const f = foods[i];
                    if (Math.abs(f.x - ah.x) < 18 && Math.abs(f.y - ah.y) < 18) {
                        ai.grow(f.val);
                        foods.splice(i, 1);
                    }
                }
            }
            
            const all = [player].concat(aiList);
            
            for (let s = 0; s < all.length; s++) {
                const snake = all[s];
                if (!snake.alive) continue;
                const sh = snake.segs[0];
                
                for (let o = 0; o < all.length; o++) {
                    if (s === o) continue;
                    const other = all[o];
                    if (!other.alive) continue;
                    
                    for (let i = 6; i < other.segs.length; i += 3) {
                        const seg = other.segs[i];
                        if (Math.abs(seg.x - sh.x) < 10 && Math.abs(seg.y - sh.y) < 10) {
                            snake.die();
                            if (snake.isPlayer) endGame();
                            break;
                        }
                    }
                }
            }
            
            while (foods.length < CFG.FOOD) {
                foods.push(spawnFood());
            }
            
            aiList = aiList.filter(function(a) { return a.alive; });
            while (aiList.length < CFG.AI) {
                aiList.push(new AI(Math.random() * CFG.WORLD, Math.random() * CFG.WORLD));
            }
        }
        
        function updateUI() {
            const all = [player].concat(aiList).filter(function(s) { return s.alive; });
            all.sort(function(a, b) { return b.segs.length - a.segs.length; });
            
            const lb = document.getElementById('lbList');
            lb.innerHTML = '';
            
            const count = Math.min(5, all.length);
            for (let i = 0; i < count; i++) {
                const li = document.createElement('li');
                li.innerHTML = '<span>' + all[i].name + '</span><span>' + all[i].segs.length + '</span>';
                if (all[i].isPlayer) li.className = 'player';
                lb.appendChild(li);
            }
            
            document.getElementById('len').textContent = player.segs.length;
            document.getElementById('score').textContent = player.segs.length * 10;
            document.getElementById('boostFill').style.width = player.energy + '%';
        }
        
        function drawMini() {
            miniCtx.fillStyle = '#111';
            miniCtx.fillRect(0, 0, 80, 80);
            
            const sc = 80 / CFG.WORLD;
            
            miniCtx.fillStyle = '#fff3';
            for (let i = 0; i < aiList.length; i++) {
                const a = aiList[i];
                if (a.alive) {
                    miniCtx.fillRect(a.segs[0].x * sc - 1, a.segs[0].y * sc - 1, 2, 2);
                }
            }
            
            if (player && player.alive) {
                miniCtx.fillStyle = settings.color;
                miniCtx.fillRect(player.segs[0].x * sc - 2, player.segs[0].y * sc - 2, 4, 4);
            }
        }
        
        function drawBg() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            
            ctx.strokeStyle = '#ffffff08';
            ctx.lineWidth = 1;
            const gs = 50;
            const ox = -cam.x % gs, oy = -cam.y % gs;
            
            ctx.beginPath();
            for (let x = ox; x < W; x += gs) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
            }
            for (let y = oy; y < H; y += gs) {
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
            }
            ctx.stroke();
            
            ctx.strokeStyle = '#f448';
            ctx.lineWidth = 2;
            ctx.strokeRect(-cam.x, -cam.y, CFG.WORLD, CFG.WORLD);
        }
        
        function drawFoods() {
            ctx.fillStyle = '#fff8';
            const camX = cam.x, camY = cam.y;
            
            for (let i = 0; i < foods.length; i++) {
                const f = foods[i];
                const sx = f.x - camX, sy = f.y - camY;
                
                if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
                
                f.pulse += 0.05;
                const sz = f.sz + Math.sin(f.pulse) * 1;
                
                if (f.rem) {
                    ctx.fillStyle = settings.color + '88';
                } else {
                    ctx.fillStyle = '#fff8';
                }
                ctx.beginPath();
                ctx.arc(sx, sy, sz / 2, 0, 6.28);
                ctx.fill();
            }
        }
        
        function loop(time) {
            if (!running) return;
            
            const delta = time - lastTime;
            if (delta < CFG.FRAME_TIME) {
                requestAnimationFrame(loop);
                return;
            }
            lastTime = time - (delta % CFG.FRAME_TIME);
            frame++;
            
            let tx = mouse.x, ty = mouse.y;
            if (ctrl.u || keys.w || keys.arrowup) ty = 0;
            if (ctrl.d || keys.s || keys.arrowdown) ty = H;
            if (ctrl.l || keys.a || keys.arrowleft) tx = 0;
            if (ctrl.r || keys.d || keys.arrowright) tx = W;
            
            if (player && player.alive) {
                player.update(tx, ty, boost);
                cam.x += (player.segs[0].x - W / 2 - cam.x) * 0.1;
                cam.y += (player.segs[0].y - H / 2 - cam.y) * 0.1;
            }
            
            for (let i = 0; i < aiList.length; i++) {
                aiList[i].updateAI();
            }
            
            collide();
            
            drawBg();
            drawFoods();
            
            for (let i = 0; i < aiList.length; i++) {
                aiList[i].draw();
            }
            
            if (player) player.draw();
            
            if ((frame % 3) === 0) {
                drawMini();
                updateUI();
            }
            
            requestAnimationFrame(loop);
        }
        
        window.startGame = function() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('settingsBtn').classList.add('visible');
            
            if (W <= 768) {
                document.getElementById('controls').classList.add('visible');
            }
            
            running = true;
            init(document.getElementById('bigStart').checked);
            lastTime = performance.now();
            requestAnimationFrame(loop);
        };
        
        function endGame() {
            running = false;
            document.getElementById('settingsBtn').classList.remove('visible');
            document.getElementById('controls').classList.remove('visible');
            document.getElementById('finalScore').textContent = 'Score: ' + (player.segs.length * 10);
            document.getElementById('endScreen').classList.remove('hidden');
        }
        
        window.restart = function() {
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('settingsBtn').classList.add('visible');
            if (W <= 768) document.getElementById('controls').classList.add('visible');
            running = true;
            init(false);
            lastTime = performance.now();
            requestAnimationFrame(loop);
        };
        
        window.togglePanel = function() {
            document.getElementById('panel').classList.toggle('open');
        };
        
        document.getElementById('settingsBtn').onclick = togglePanel;
        
        window.applySet = function() {
            settings.head = parseFloat(document.getElementById('headSize').value);
            settings.speed = parseInt(document.getElementById('spd').value, 10);
            settings.glow = parseInt(document.getElementById('glw').value, 10);
            
            if (player) {
                player.headSize = settings.head;
                player.spd = settings.speed;
                player.boostSpd = settings.speed * 1.8;
            }
            togglePanel();
        };
        
        document.querySelectorAll('.dpad .ctrl-btn').forEach(function(btn) {
            const d = btn.getAttribute('data-d');
            btn.addEventListener('touchstart', function(e) { e.preventDefault(); ctrl[d] = 1; });
            btn.addEventListener('touchend', function() { ctrl[d] = 0; });
            btn.addEventListener('mousedown', function() { ctrl[d] = 1; });
            btn.addEventListener('mouseup', function() { ctrl[d] = 0; });
            btn.addEventListener('mouseleave', function() { ctrl[d] = 0; });
        });
        
        const boostCtrl = document.getElementById('boostCtrl');
        boostCtrl.addEventListener('touchstart', function(e) { e.preventDefault(); boost = true; });
        boostCtrl.addEventListener('touchend', function() { boost = false; });
        boostCtrl.addEventListener('mousedown', function() { boost = true; });
        boostCtrl.addEventListener('mouseup', function() { boost = false; });
        
        canvas.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
        canvas.addEventListener('touchmove', function(e) { 
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });
        
        canvas.addEventListener('mousedown', function() { boost = true; });
        canvas.addEventListener('mouseup', function() { boost = false; });
        canvas.addEventListener('touchstart', function(e) {
            if (e.touches[0].clientX > W * 0.3 && e.touches[0].clientX < W * 0.7) {
                boost = true;
            }
        });
        canvas.addEventListener('touchend', function() { boost = false; });
        
        document.addEventListener('keydown', function(e) {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' || e.key === 'Shift') { boost = true; e.preventDefault(); }
        });
        document.addEventListener('keyup', function(e) {
            keys[e.key.toLowerCase()] = false;
            if (e.key === ' ' || e.key === 'Shift') boost = false;
        });
        
        document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        
    })();
    </script>
</body>
</html>
